version: '3.9'

services:
  boilerplate-nest-production:
    container_name: boilerplate-nest-production
    build:
      context: ../
      dockerfile: ./build/Dockerfile.production
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_PASSWORD_SEED: ${SUPER_ADMIN_PASSWORD_SEED}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      RUN_SEED: ${RUN_SEED:-0}
      REDIS_HOST: ${REDIS_HOST:-boilerplate-nest-redis-production}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-bn}
      REDIS_DEFAULT_TTL: ${REDIS_DEFAULT_TTL:-300}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      boilerplate-nest-database-postgres-production:
        condition: service_healthy
      boilerplate-nest-redis-production:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: always
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  boilerplate-nest-database-postgres-production:
    container_name: boilerplate-nest-database-postgres-production
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - boilerplate-postgres-production-data:/var/lib/postgresql/data
    networks:
      - boilerplate-network
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  boilerplate-nest-redis-production:
    container_name: boilerplate-nest-redis-production
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - boilerplate-redis-production-data:/data
    networks:
      - boilerplate-network
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  boilerplate-postgres-production-data:
  boilerplate-redis-production-data:

networks:
  boilerplate-network:
    driver: bridge
