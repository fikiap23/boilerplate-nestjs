version: '3.9'

services:
  boilerplate-nest-production:
    container_name: boilerplate-nest-production
    build:
      context: ../
      dockerfile: ./build/Dockerfile.production
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_PASSWORD_SEED: ${SUPER_ADMIN_PASSWORD_SEED}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      RUN_SEED: ${RUN_SEED:-0}
    depends_on:
      boilerplate-nest-database-postgres-production:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: always
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/', (r)=>process.exit(r.statusCode===200?0:1)).on('error', ()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  boilerplate-nest-database-postgres-production:
    container_name: boilerplate-nest-database-postgres-production
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - boilerplate-postgres-production-data:/var/lib/postgresql/data
    networks:
      - boilerplate-network
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  boilerplate-postgres-production-data:

networks:
  boilerplate-network:
    driver: bridge
