services:
  boilerplate-nest-database-postgres-migrate:
    container_name: boilerplate-nest-database-postgres-migrate
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-boilerplate_nest_migrate}
    ports:
      - '5433:5432'
    volumes:
      - boilerplate-postgres-migrate-data:/var/lib/postgresql/data
    networks:
      - boilerplate-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-boilerplate_nest_migrate}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  boilerplate-nest-migrate:
    container_name: boilerplate-nest-migrate
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    working_dir: /usr/src/app
    command: ['sh', '-c', 'chmod +x ./build/migrate.sh && ./build/migrate.sh']
    env_file:
      - build/.env.migrate
    environment:
      DATABASE_URL: ${DATABASE_URL_MIGRATE}
    volumes:
      - ../:/usr/src/app
    depends_on:
      boilerplate-nest-database-postgres-migrate:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: 'no'

volumes:
  boilerplate-postgres-migrate-data:

networks:
  boilerplate-network:
    external: true
