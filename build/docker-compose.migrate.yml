services:
  boilerplate-nest-database-mysql-migrate:
    container_name: boilerplate-nest-database-mysql-migrate
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-boilerplate_nest_migrate}
    ports:
      - '3307:3306'
    volumes:
      - boilerplate-mysql-migrate-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - boilerplate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  boilerplate-nest-migrate:
    container_name: boilerplate-nest-migrate
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    working_dir: /usr/src/app
    command: ['sh', '-c', 'chmod +x ./build/migrate.sh && ./build/migrate.sh']
    env_file:
      - build/.env.migrate
    environment:
      DATABASE_URL: ${DATABASE_URL_MIGRATE}
    volumes:
      - ../:/usr/src/app
    depends_on:
      boilerplate-nest-database-mysql-migrate:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: 'no'

volumes:
  boilerplate-mysql-migrate-data:

networks:
  boilerplate-network:
    external: true
