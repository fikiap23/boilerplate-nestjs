version: '3.8'

services:
  boilerplate-nest-dev:
    container_name: boilerplate-nest-dev
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    command:
      ['sh', '-c', 'chmod +x ./build/entrypoint.sh && ./build/entrypoint.sh']
    ports:
      - ${PORT_BE:-3000}:3000
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL_DEV}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_PASSWORD_SEED: ${SUPER_ADMIN_PASSWORD_SEED}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      boilerplate-nest-database-postgres-dev:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: unless-stopped

  boilerplate-nest-database-postgres-dev:
    container_name: boilerplate-nest-database-postgres-dev
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - boilerplate-postgres-dev-data:/var/lib/postgresql/data
    networks:
      - boilerplate-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  boilerplate-postgres-dev-data:

networks:
  boilerplate-network:
    external: true
