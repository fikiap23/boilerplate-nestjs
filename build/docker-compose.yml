services:
  boilerplate-nest-dev:
    container_name: boilerplate-nest-dev
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    command:
      ['sh', '-c', 'chmod +x ./build/entrypoint.sh && ./build/entrypoint.sh']
    ports:
      - ${PORT_BE:-3000}:3000
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL_DEV}
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_PASSWORD_SEED: ${SUPER_ADMIN_PASSWORD_SEED}
      SWAGGER_USERNAME: ${SWAGGER_USERNAME}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-boilerplate-nest-redis-dev}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PREFIX: ${REDIS_PREFIX:-bn}
      REDIS_DEFAULT_TTL: ${REDIS_DEFAULT_TTL:-300}
      CACHE_DEBUG: ${CACHE_DEBUG:-false}
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      boilerplate-nest-database-postgres-dev:
        condition: service_healthy
      boilerplate-nest-redis-dev:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: unless-stopped

  boilerplate-nest-database-postgres-dev:
    container_name: boilerplate-nest-database-postgres-dev
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - boilerplate-postgres-dev-data:/var/lib/postgresql/data
    networks:
      - boilerplate-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  boilerplate-nest-redis-dev:
    container_name: boilerplate-nest-redis-dev
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - boilerplate-redis-dev-data:/data
    networks:
      - boilerplate-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  boilerplate-nest-redis-commander-dev:
    container_name: boilerplate-nest-redis-commander-dev
    image: rediscommander/redis-commander:latest
    ports:
      - '${PORT_REDIS_COMMANDER:-8081}:8081'
    environment:
      REDIS_HOSTS: local:${REDIS_HOST:-boilerplate-nest-redis-dev}:${REDIS_PORT:-6379}
      HTTP_USER: ${REDIS_COMMANDER_HTTP_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_HTTP_PASSWORD:-admin}
    depends_on:
      boilerplate-nest-redis-dev:
        condition: service_healthy
    networks:
      - boilerplate-network
    restart: unless-stopped

volumes:
  boilerplate-postgres-dev-data:
  boilerplate-redis-dev-data:

networks:
  boilerplate-network:
    external: true
